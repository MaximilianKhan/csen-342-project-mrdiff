# mr-Diff Configuration — Small model with K=20 diffusion steps
# Fewer steps = shorter sampling trajectory = less error accumulation

model:
  num_stages: 3
  diffusion_steps: 20       # was 100 — much shorter trajectory
  embedding_dim: 64
  hidden_dim: 64
  kernel_sizes: [25, 201]
  dropout: 0.3
  num_encoder_layers: 2
  num_decoder_layers: 2

data:
  dataset: "ETTh1"
  data_path: "data/ETDataset"
  lookback_length: 336
  forecast_length: 168
  batch_size: 64
  num_workers: 4
  train_ratio: 0.6
  val_ratio: 0.2
  test_ratio: 0.2
  univariate: false

training:
  learning_rate: 0.0005
  weight_decay: 0.01
  max_epochs: 100
  min_epochs: 30
  early_stopping_patience: 20
  grad_clip_norm: 1.0
  beta_start: 0.0001
  beta_end: 0.1
  schedule_type: cosine     # cosine works well with fewer steps
  mixup_prob: 0.5

logging:
  log_dir: "logs"
  checkpoint_dir: "checkpoints"
  log_every_n_steps: 100
  save_every_n_epochs: 5
  tensorboard: true
  csv_logging: true

evaluation:
  num_samples: 10
  metrics: ["mae", "mse"]

experiment:
  name: "mr_diff_k20"
  seed: 42
